spring:
  application:
    name: gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: notification-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/notifications/**
              filters:
                - StripPrefix=2
          default-filters:
            - TokenRelay
server:
  port: 8080