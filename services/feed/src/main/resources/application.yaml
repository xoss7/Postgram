server:
  port: 8084

spring:
  application:
    name: feed-service
  profiles:
    default: dev
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_CLUSTER}
    consumer:
      group-id: feed-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "sn.edu.ept.postgram.shared.events"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_SERVER}

feed:
  max-size: 500           # nombre max de posts dans un feed Redis
  default-page-size: 20
  backfill-limit: 20

services:
  social-service: http://localhost:8083
  content-service: http://localhost:8082

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_SERVER}:${EUREKA_PORT}/eureka/